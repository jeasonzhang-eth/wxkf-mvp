<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客服聊天记录 — wxkf-mvp</title>
<style>
  :root {
    --bg: #f0f2f5;
    --sidebar-bg: #ffffff;
    --chat-bg: #efeae2;
    --bubble-in: #ffffff;
    --bubble-out: #d9fdd3;
    --text: #111b21;
    --text-secondary: #667781;
    --accent: #00a884;
    --border: #e9edef;
    --hover: #f5f6f6;
    --active: #e9f7f2;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    height: 100vh; display: flex; background: var(--bg); color: var(--text);
  }

  /* ===== Sidebar ===== */
  .sidebar {
    width: 360px; min-width: 320px; background: var(--sidebar-bg);
    border-right: 1px solid var(--border); display: flex; flex-direction: column;
  }
  .sidebar-header {
    padding: 16px; background: var(--accent); color: #fff;
    font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px;
  }
  .sidebar-header .dot { width: 8px; height: 8px; border-radius: 50%; background: #fff; }
  .sidebar-header .dot.offline { background: #ffbc00; }
  .refresh-btn {
    margin-left: auto; background: none; border: none; color: #fff; cursor: pointer;
    font-size: 18px; padding: 4px 8px; border-radius: 4px;
  }
  .refresh-btn:hover { background: rgba(255,255,255,.15); }
  .conv-list { flex: 1; overflow-y: auto; }
  .conv-item {
    padding: 14px 16px; border-bottom: 1px solid var(--border); cursor: pointer;
    display: flex; flex-direction: column; gap: 4px;
  }
  .conv-item:hover { background: var(--hover); }
  .conv-item.active { background: var(--active); }
  .conv-item .top { display: flex; justify-content: space-between; align-items: baseline; }
  .conv-item .user { font-size: 14px; font-weight: 500; }
  .conv-item .time { font-size: 11px; color: var(--text-secondary); white-space: nowrap; }
  .conv-item .preview { font-size: 13px; color: var(--text-secondary); }
  .conv-item .meta { font-size: 11px; color: var(--text-secondary); }
  .conv-item .direction-tag {
    font-size: 10px; padding: 1px 6px; border-radius: 8px; font-weight: 500;
    display: inline-block;
  }
  .conv-item .direction-tag.in { background: #e3f2fd; color: #1565c0; }
  .conv-item .direction-tag.out { background: #e8f5e9; color: #2e7d32; }
  .empty-state {
    padding: 32px 16px; text-align: center; color: var(--text-secondary); font-size: 13px;
  }

  /* ===== Chat area ===== */
  .chat-area {
    flex: 1; display: flex; flex-direction: column; background: var(--chat-bg);
  }
  .chat-header {
    padding: 14px 20px; background: var(--sidebar-bg); border-bottom: 1px solid var(--border);
    font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px;
  }
  .chat-header .user-id { font-weight: 400; color: var(--text-secondary); font-size: 12px; }
  .chat-placeholder {
    flex: 1; display: flex; align-items: center; justify-content: center;
    color: var(--text-secondary); font-size: 14px;
  }
  .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 4px; }
  .msg-row { display: flex; margin-bottom: 2px; }
  .msg-row.in { justify-content: flex-start; }
  .msg-row.out { justify-content: flex-end; }
  .msg-bubble {
    max-width: 70%; padding: 8px 12px; border-radius: 8px; font-size: 14px;
    line-height: 1.5; word-break: break-word; position: relative;
    box-shadow: 0 1px 1px rgba(0,0,0,.05);
  }
  .msg-row.in .msg-bubble { background: var(--bubble-in); border-top-left-radius: 0; }
  .msg-row.out .msg-bubble { background: var(--bubble-out); border-top-right-radius: 0; }
  .msg-meta {
    font-size: 11px; color: var(--text-secondary); margin-top: 2px;
    display: flex; justify-content: flex-end; gap: 6px;
  }
  .msg-row.in .msg-meta { justify-content: flex-start; }
  .msg-date-divider {
    text-align: center; margin: 12px 0 8px; font-size: 11px; color: var(--text-secondary);
  }
  .msg-date-divider span {
    background: #e1f3ec; padding: 4px 12px; border-radius: 6px;
  }
</style>
</head>
<body>

<!-- ===== Sidebar ===== -->
<aside class="sidebar">
  <div class="sidebar-header">
    <span class="dot" id="status-dot"></span>
    <span>客服聊天</span>
    <button class="refresh-btn" onclick="refresh()" title="刷新">⟳</button>
  </div>
  <div class="conv-list" id="conv-list">
    <div class="empty-state">暂无聊天记录</div>
  </div>
</aside>

<!-- ===== Chat ===== -->
<main class="chat-area">
  <div class="chat-header" id="chat-header" style="display:none">
    <span id="chat-user-name">—</span>
    <span class="user-id" id="chat-user-id"></span>
  </div>
  <div class="chat-placeholder" id="chat-placeholder">← 选择一个会话查看聊天记录</div>
  <div class="messages" id="messages" style="display:none"></div>
</main>

<script>
const API = {
  conversations: () => fetch('/api/conversations').then(r => r.json()).catch(() => []),
  messages: user => fetch('/api/messages?user=' + encodeURIComponent(user)).then(r => r.json()).catch(() => []),
  names: users => fetch('/api/names', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ users }) }).then(r => r.json()).then(d => d.names).catch(() => ({})),
  send: (toUser, openKfId, content) => fetch('/api/send', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ toUser, openKfId, content }) }).then(r => r.json()).catch(() => ({ ok: false })),
};

let currentUser = null;
let currentOpenKfId = null;
let autoRefreshTimer = null;

function fmtTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  const time = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
  if (d.toDateString() === now.toDateString()) return time;
  return `${d.getMonth()+1}/${d.getDate()} ${time}`;
}

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
}

function isSameDay(a, b) {
  if (!a || !b) return false;
  const da = new Date(a), db = new Date(b);
  return da.toDateString() === db.toDateString();
}

function displayName(conv) {
  return conv.name || conv.external_userid;
}

// Fetch names in batch and render conv list
async function loadConversations() {
  const convs = await API.conversations();
  const list = document.getElementById('conv-list');
  if (!convs.length) {
    list.innerHTML = '<div class="empty-state">暂无聊天记录</div>';
    return;
  }
  // Batch fetch names for users without a cached name
  const missing = convs.filter(c => !c.name).map(c => c.external_userid);
  if (missing.length > 0) {
    const freshNames = await API.names(missing);
    // Merge fresh names into convs
    for (const c of convs) {
      if (!c.name && freshNames[c.external_userid]) c.name = freshNames[c.external_userid];
    }
  }
  list.innerHTML = convs.map(c => {
    const tag = c.last_direction === 'in'
      ? '<span class="direction-tag in">用户→</span>'
      : '<span class="direction-tag out">←客服</span>';
    const name = displayName(c);
    return `<div class="conv-item${c.external_userid === currentUser ? ' active' : ''}"
      onclick="selectUser('${c.external_userid}', '${c.open_kfid || ''}')">
      <div class="top">
        <span class="user" data-uid="${c.external_userid}">${escapeHtml(name)}</span>
        <span class="time">${fmtTime(c.last_message_at)}</span>
      </div>
      <div class="preview">${tag} ${c.last_content || ''}</div>
      <div class="meta">${c.message_count} 条消息</div>
    </div>`;
  }).join('');
}

async function selectUser(user, openKfId) {
  currentUser = user;
  currentOpenKfId = openKfId;
  document.getElementById('chat-placeholder').style.display = 'none';
  document.getElementById('messages').style.display = 'flex';
  document.getElementById('chat-header').style.display = 'flex';

  // Update header with name
  const convs = await API.conversations();
  const conv = convs.find(c => c.external_userid === user);
  const name = conv ? displayName(conv) : user;
  document.getElementById('chat-user-name').textContent = '💬 ';
  document.getElementById('chat-user-id').textContent = name + ' (' + user + ')';

  // Update active state
  document.querySelectorAll('.conv-item').forEach(el => {
    el.classList.toggle('active', el.querySelector('.user[data-uid]')?.dataset.uid === user);
  });

  const msgs = await API.messages(user);
  const container = document.getElementById('messages');
  let lastDate = '';
  container.innerHTML = msgs.map((m, i) => {
    const date = fmtDate(m.timestamp);
    const divider = !isSameDay(m.timestamp, lastDate)
      ? `<div class="msg-date-divider"><span>${date}</span></div>`
      : '';
    lastDate = m.timestamp;
    const dir = m.direction === 'in' ? 'in' : 'out';
    const label = dir === 'in' ? (name) : '客服';
    return divider + `<div class="msg-row ${dir}">
      <div class="msg-bubble">
        <div>${escapeHtml(m.content)}</div>
        <div class="msg-meta">
          <span>${label}</span>
          <span>${fmtTime(m.timestamp)}</span>
        </div>
      </div>
    </div>`;
  }).join('');
  container.scrollTop = container.scrollHeight;
}

function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

async function refresh() {
  await loadConversations();
  const dot = document.getElementById('status-dot');
  dot.classList.remove('offline');
  setTimeout(() => dot.classList.add('offline'), 300);
  if (currentUser) {
    await selectUser(currentUser, currentOpenKfId);
  }
}

// Auto-refresh every 5 seconds
autoRefreshTimer = setInterval(async () => {
  await loadConversations();
  if (currentUser) {
    const msgs = await API.messages(currentUser);
    const container = document.getElementById('messages');
    const wasAtBottom = container.scrollTop + container.clientHeight >= container.scrollHeight - 50;
    const currentCount = container.querySelectorAll('.msg-row').length;
    if (msgs.length !== currentCount) {
      await selectUser(currentUser, currentOpenKfId);
      if (wasAtBottom) container.scrollTop = container.scrollHeight;
    }
  }
}, 5000);

// Initial load
loadConversations();
</script>
</body>
</html>
