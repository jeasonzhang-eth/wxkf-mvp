<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>客服聊天记录 — wxkf-mvp</title>
<style>
  :root {
    --bg: #f0f2f5;
    --sidebar-bg: #ffffff;
    --chat-bg: #efeae2;
    --bubble-in: #ffffff;
    --bubble-out: #d9fdd3;
    --text: #111b21;
    --text-secondary: #667781;
    --accent: #00a884;
    --border: #e9edef;
    --hover: #f5f6f6;
    --active: #e9f7f2;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    height: 100vh; height: 100dvh;
    display: flex; background: var(--bg); color: var(--text);
    overflow: hidden;
  }

  /* ===== Sidebar ===== */
  .sidebar {
    width: 360px; min-width: 320px; background: var(--sidebar-bg);
    border-right: 1px solid var(--border); display: flex; flex-direction: column;
    flex-shrink: 0;
  }
  .sidebar-header {
    padding: 14px 16px; background: var(--accent); color: #fff;
    font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px;
    flex-shrink: 0;
  }
  .sidebar-header .dot { width: 8px; height: 8px; border-radius: 50%; background: #fff; flex-shrink: 0; }
  .sidebar-header .dot.offline { background: #ffbc00; }
  .sidebar-header .title-text { flex: 1; }
  .refresh-btn {
    background: none; border: none; color: #fff; cursor: pointer;
    font-size: 20px; padding: 4px 8px; border-radius: 4px; line-height: 1;
  }
  .refresh-btn:active { background: rgba(255,255,255,.2); }
  @media (hover: hover) { .refresh-btn:hover { background: rgba(255,255,255,.15); } }
  .conv-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .conv-item {
    padding: 14px 16px; border-bottom: 1px solid var(--border); cursor: pointer;
    display: flex; flex-direction: column; gap: 4px;
    -webkit-tap-highlight-color: transparent;
  }
  .conv-item:active { background: var(--hover); }
  @media (hover: hover) { .conv-item:hover { background: var(--hover); } }
  .conv-item.active { background: var(--active); }
  .conv-item .top { display: flex; justify-content: space-between; align-items: baseline; }
  .conv-item .user { font-size: 15px; font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-right: 8px; }
  .conv-item .time { font-size: 11px; color: var(--text-secondary); white-space: nowrap; flex-shrink: 0; }
  .conv-item .preview { font-size: 13px; color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .conv-item .meta { font-size: 11px; color: var(--text-secondary); }
  .conv-item .direction-tag {
    font-size: 10px; padding: 1px 6px; border-radius: 8px; font-weight: 500;
    display: inline-block; flex-shrink: 0;
  }
  .conv-item .direction-tag.in { background: #e3f2fd; color: #1565c0; }
  .conv-item .direction-tag.out { background: #e8f5e9; color: #2e7d32; }
  .conv-item .kf-badge {
    display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 8px;
    background: #fff3e0; color: #e65100; margin-right: 6px; font-weight: 500;
  }
  .empty-state {
    padding: 48px 16px; text-align: center; color: var(--text-secondary); font-size: 14px;
  }

  /* ===== Chat area ===== */
  .chat-area {
    flex: 1; display: flex; flex-direction: column; background: var(--chat-bg);
    min-width: 0;
  }
  .chat-header {
    padding: 12px 16px; background: var(--sidebar-bg); border-bottom: 1px solid var(--border);
    font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px;
    flex-shrink: 0; min-height: 48px;
  }
  .back-btn {
    display: none; background: none; border: none; color: var(--text);
    font-size: 22px; cursor: pointer; padding: 2px 8px 2px 0; line-height: 1; flex-shrink: 0;
  }
  .back-btn:active { opacity: .5; }
  .chat-header .info { flex: 1; min-width: 0; }
  .chat-header .name { font-size: 15px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .chat-header .uid { font-weight: 400; color: var(--text-secondary); font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .chat-placeholder {
    flex: 1; display: flex; align-items: center; justify-content: center;
    color: var(--text-secondary); font-size: 14px;
  }
  .messages {
    flex: 1; overflow-y: auto; padding: 12px 16px;
    display: flex; flex-direction: column; gap: 3px;
    -webkit-overflow-scrolling: touch;
  }
  .msg-row { display: flex; margin-bottom: 2px; }
  .msg-row.in { justify-content: flex-start; }
  .msg-row.out { justify-content: flex-end; }
  .msg-bubble {
    max-width: 80%; padding: 8px 12px; border-radius: 8px; font-size: 15px;
    line-height: 1.5; word-break: break-word; position: relative;
    box-shadow: 0 1px 1px rgba(0,0,0,.05);
  }
  .msg-row.in .msg-bubble { background: var(--bubble-in); border-top-left-radius: 0; }
  .msg-row.out .msg-bubble { background: var(--bubble-out); border-top-right-radius: 0; }
  .msg-meta {
    font-size: 11px; color: var(--text-secondary); margin-top: 3px;
    display: flex; justify-content: flex-end; gap: 6px;
  }
  .msg-row.in .msg-meta { justify-content: flex-start; }
  .msg-date-divider {
    text-align: center; margin: 10px 0 6px; font-size: 11px; color: var(--text-secondary);
  }
  .msg-date-divider span {
    background: #e1f3ec; padding: 3px 10px; border-radius: 6px;
  }

  /* ===== Input bar ===== */
  .input-bar {
    padding: 8px 12px; background: var(--sidebar-bg); border-top: 1px solid var(--border);
    display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0;
  }
  .input-bar textarea {
    flex: 1; border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px;
    font-size: 15px; font-family: inherit; resize: none; outline: none;
    max-height: 100px; line-height: 1.4;
  }
  .input-bar textarea:focus { border-color: var(--accent); }
  .input-bar button {
    background: var(--accent); color: #fff; border: none; border-radius: 8px;
    padding: 8px 16px; font-size: 14px; font-weight: 600; cursor: pointer;
    flex-shrink: 0; white-space: nowrap;
  }
  .input-bar button:active { opacity: .8; }
  .input-bar button:disabled { opacity: .4; }
  @media (hover: hover) { .input-bar button:hover { opacity: .9; } }
  @media (max-width: 767px) {
    .input-bar { padding: 8px 10px; gap: 6px; }
    .input-bar textarea { font-size: 16px; } /* prevent iOS zoom on focus */
    .input-bar button { padding: 8px 12px; font-size: 14px; }
  }

  /* ===== Mobile: two-panel toggle ===== */
  @media (max-width: 767px) {
    .sidebar {
      width: 100%; min-width: 0; border-right: none;
      display: flex;
    }
    .sidebar.hidden-on-mobile { display: none; }

    .chat-area {
      display: none;
    }
    .chat-area.visible-on-mobile { display: flex; }

    .back-btn { display: inline; }

    .chat-header { padding: 10px 12px; min-height: 44px; }
    .messages { padding: 10px 12px; }
    .msg-bubble { max-width: 85%; font-size: 15px; }
    .conv-item { padding: 12px 14px; }
    .conv-item .user { font-size: 15px; }
  }

  /* ===== Desktop: sidebar always visible ===== */
  @media (min-width: 768px) {
    .sidebar { display: flex !important; }
    .chat-area { display: flex !important; }
    .chat-placeholder { display: flex !important; }
    .back-btn { display: none !important; }
  }
</style>
</head>
<body>

<!-- ===== Sidebar ===== -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <span class="dot" id="status-dot"></span>
    <span class="title-text">客服聊天</span>
    <button class="refresh-btn" onclick="refresh()" title="刷新">⟳</button>
  </div>
  <div class="conv-list" id="conv-list">
    <div class="empty-state">暂无聊天记录</div>
  </div>
</aside>

<!-- ===== Chat ===== -->
<main class="chat-area" id="chat-area">
  <div class="chat-header" id="chat-header" style="display:none">
    <button class="back-btn" onclick="goBack()" title="返回">←</button>
    <div class="info">
      <div class="name" id="chat-name">—</div>
      <div class="uid" id="chat-uid"></div>
    </div>
  </div>
  <div class="chat-placeholder" id="chat-placeholder">← 选择一个会话查看聊天记录</div>
  <div class="messages" id="messages" style="display:none"></div>
  <div class="input-bar" id="input-bar" style="display:none">
    <textarea id="msg-input" rows="1" placeholder="输入回复…" onkeydown="onInputKey(event)"></textarea>
    <button onclick="sendMessage()" id="send-btn">发送</button>
  </div>
</main>

<script>
const IS_MOBILE = window.matchMedia('(max-width: 767px)').matches;

function $id(id) { return document.getElementById(id); }

// Wrap fetch to redirect on 401
async function apiFetch(url, opts = {}) {
  const res = await fetch(url, opts);
  if (res.status === 401) { window.location.href = '/login'; return null; }
  return res;
}

const API = {
  conversations: () => apiFetch('/api/conversations').then(r => r?.json()).catch(() => []),
  messages: (user, kf) => apiFetch('/api/messages?user=' + encodeURIComponent(user) + (kf ? '&kf=' + encodeURIComponent(kf) : '')).then(r => r?.json()).catch(() => []),
  names: users => apiFetch('/api/names', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ users }) }).then(r => r?.json()).then(d => d?.names).catch(() => ({})),
  send: (toUser, openKfId, content) => apiFetch('/api/send', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ toUser, openKfId, content }) }).then(r => r?.json()).catch(() => ({ ok: false })),
};

let currentUser = null;
let currentOpenKfId = null;

function fmtTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  const time = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
  if (d.toDateString() === now.toDateString()) return time;
  return `${d.getMonth()+1}/${d.getDate()} ${time}`;
}

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
}

function isSameDay(a, b) {
  if (!a || !b) return false;
  const da = new Date(a), db = new Date(b);
  return da.toDateString() === db.toDateString();
}

function displayName(conv) {
  return conv.name || conv.external_userid;
}

function showPanel(panel) {
  const sidebar = $id('sidebar');
  const chatArea = $id('chat-area');
  if (panel === 'sidebar') {
    sidebar.classList.remove('hidden-on-mobile');
    chatArea.classList.remove('visible-on-mobile');
  } else {
    sidebar.classList.add('hidden-on-mobile');
    chatArea.classList.add('visible-on-mobile');
  }
}

function goBack() {
  currentUser = null;
  currentOpenKfId = null;
  $id('input-bar').style.display = 'none';
  $id('chat-header').style.display = 'none';
  $id('messages').style.display = 'none';
  $id('chat-placeholder').style.display = 'flex';
  showPanel('sidebar');
}

async function loadConversations() {
  const convs = await API.conversations();
  if (!convs) return; // 401 redirect
  const list = $id('conv-list');
  if (!convs.length) {
    list.innerHTML = '<div class="empty-state">暂无聊天记录</div>';
    return;
  }
  const missing = convs.filter(c => !c.name).map(c => c.external_userid);
  if (missing.length > 0) {
    const freshNames = await API.names(missing);
    for (const c of convs) {
      if (!c.name && freshNames[c.external_userid]) c.name = freshNames[c.external_userid];
    }
  }
  list.innerHTML = convs.map(c => {
    const tag = c.last_direction === 'in'
      ? '<span class="direction-tag in">用户→</span>'
      : '<span class="direction-tag out">←客服</span>';
    const name = displayName(c);
    const active = c.external_userid === currentUser && c.open_kfid === currentOpenKfId;
    const kfBadge = c.kf_name ? `<span class="kf-badge">${escapeHtml(c.kf_name)}</span>` : '';
    return `<div class="conv-item${active ? ' active' : ''}"
      data-uid="${c.external_userid}" data-kf="${c.open_kfid || ''}"
      onclick="selectUser('${c.external_userid}', '${c.open_kfid || ''}')">
      <div class="top">
        <span class="user">${escapeHtml(name)}</span>
        <span class="time">${fmtTime(c.last_message_at)}</span>
      </div>
      <div class="preview">${tag} ${c.last_content || ''}</div>
      <div class="meta">${kfBadge}${c.message_count} 条消息</div>
    </div>`;
  }).join('');
}

async function selectUser(user, openKfId) {
  currentUser = user;
  currentOpenKfId = openKfId;

  const convs = await API.conversations();
  if (!convs) return; // 401 redirect
  const conv = convs.find(c => c.external_userid === user && c.open_kfid === openKfId);
  const name = conv ? displayName(conv) : user;
  const kfName = conv?.kf_name || '';

  $id('chat-name').textContent = name;
  $id('chat-uid').textContent = (kfName ? kfName + ' · ' : '') + user;
  $id('chat-placeholder').style.display = 'none';
  $id('messages').style.display = 'flex';
  $id('chat-header').style.display = 'flex';
  $id('input-bar').style.display = 'flex';

  // Update sidebar active (composite: user + open_kfid)
  document.querySelectorAll('.conv-item').forEach(el => {
    el.classList.toggle('active', el.dataset.uid === user && el.dataset.kf === openKfId);
  });

  // On mobile, switch to chat panel
  if (IS_MOBILE) showPanel('chat');

  // Render messages (filtered by this 客服账号)
  const msgs = await API.messages(user, openKfId);
  if (!msgs) return; // 401 redirect
  const container = $id('messages');
  let lastDate = '';
  container.innerHTML = msgs.map(m => {
    const date = fmtDate(m.timestamp);
    const divider = !isSameDay(m.timestamp, lastDate)
      ? `<div class="msg-date-divider"><span>${date}</span></div>`
      : '';
    lastDate = m.timestamp;
    const dir = m.direction === 'in' ? 'in' : 'out';
    const who = escapeHtml(dir === 'in' ? name : '客服');
    return divider + `<div class="msg-row ${dir}">
      <div class="msg-bubble">
        <div>${escapeHtml(m.content)}</div>
        <div class="msg-meta">
          <span>${who}</span>
          <span>${fmtTime(m.timestamp)}</span>
        </div>
      </div>
    </div>`;
  }).join('');
  container.scrollTop = container.scrollHeight;
}

function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function onInputKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

async function sendMessage() {
  const input = $id('msg-input');
  const content = input.value.trim();
  if (!content || !currentUser || !currentOpenKfId) return;

  const btn = $id('send-btn');
  btn.disabled = true;
  btn.textContent = '…';

  const res = await API.send(currentUser, currentOpenKfId, content);

  btn.disabled = false;
  btn.textContent = '发送';

  if (res.ok) {
    input.value = '';
    autoResize(input);
    // Refresh to show the sent message
    await selectUser(currentUser, currentOpenKfId);
  } else {
    alert(res.errmsg || '发送失败');
  }
}

// Auto-resize textarea on input
document.addEventListener('DOMContentLoaded', () => {
  const input = $id('msg-input');
  if (input) input.addEventListener('input', () => autoResize(input));
});

async function refresh() {
  await loadConversations();
  const dot = $id('status-dot');
  dot.classList.remove('offline');
  setTimeout(() => dot.classList.add('offline'), 300);
  if (currentUser) {
    await selectUser(currentUser, currentOpenKfId);
  }
}

// Auto-refresh every 5 seconds
setInterval(async () => {
  if (!currentUser) {
    await loadConversations();
    return;
  }
  await loadConversations();
  const msgs = await API.messages(currentUser, currentOpenKfId);
  if (!msgs) return; // 401 redirect
  const container = $id('messages');
  const wasAtBottom = container.scrollTop + container.clientHeight >= container.scrollHeight - 50;
  const currentCount = container.querySelectorAll('.msg-row').length;
  if (msgs.length !== currentCount) {
    await selectUser(currentUser, currentOpenKfId);
    if (wasAtBottom) container.scrollTop = container.scrollHeight;
  }
}, 5000);

// Handle resize: if switching to desktop, ensure both panels visible
window.matchMedia('(min-width: 768px)').addEventListener('change', (e) => {
  if (e.matches) {
    // Switched to desktop — both panels visible, no class overrides needed
    $id('sidebar').classList.remove('hidden-on-mobile');
    $id('chat-area').classList.add('visible-on-mobile');
  }
});

// Initial load
loadConversations();
// On desktop, chat area starts visible (no panel toggle)
if (!IS_MOBILE) $id('chat-area').classList.add('visible-on-mobile');
</script>
</body>
</html>
